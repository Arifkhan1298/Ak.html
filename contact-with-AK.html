<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Arif Khan - Ultra Pro Contact</title>

<!-- EmailJS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
  (function(){
    emailjs.init("YOUR_PUBLIC_KEY"); 
  })();
</script>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top,#0f172a,#020617);
  font-family: Arial;
  color:white;
}

/* CARD */
.card{
  width:380px;
  padding:25px;
  border-radius:20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(18px);
  box-shadow:0 0 40px rgba(0,0,0,0.7);
  animation: float 5s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-12px);}
}

h1{
  margin:0;
}

.subtitle{
  color:#94a3b8;
  font-size:13px;
}

/* BOX */
.box{
  margin-top:12px;
  padding:10px;
  border-radius:12px;
  background: rgba(255,255,255,0.1);
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:13px;
}

button,a{
  padding:6px 10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#38bdf8;
  color:black;
  font-weight:bold;
  text-decoration:none;
  transition:0.3s;
}

button:hover,a:hover{
  transform:scale(1.05);
  background:#0ea5e9;
}

/* FORM */
input,textarea{
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:none;
  outline:none;
  background: rgba(255,255,255,0.1);
  color:white;
}

textarea{height:80px; resize:none;}

.send-btn{
  margin-top:12px;
  width:100%;
  padding:10px;
  border-radius:12px;
  background: linear-gradient(90deg,#22c55e,#38bdf8);
  font-weight:bold;
  cursor:pointer;
  animation: glow 2s infinite;
}

@keyframes glow{
  0%{box-shadow:0 0 5px #22c55e;}
  50%{box-shadow:0 0 20px #38bdf8;}
  100%{box-shadow:0 0 5px #22c55e;}
}

#msg{
  font-size:12px;
  color:#a3e635;
  margin-top:8px;
}
</style>
</head>

<body>

<div class="card">

<h1>👨‍💻 Arif Khan</h1>
<div class="subtitle">Full Stack Developer | Pakistan 🇵🇰</div>

<!-- PHONE -->
<div class="box">
📞 <span id="phone">0313 8983870</span>
<button onclick="copyPhone()">Copy</button>
</div>

<!-- WHATSAPP -->
<div class="box">
💬 WhatsApp
<a href="https://wa.me/923085772129" target="_blank">Chat</a>
</div>

<!-- EMAIL -->
<div class="box">
📧 Email
<span>arifkhankkhan002@gmail.com</span>
</div>

<!-- ADDRESS -->
<div class="box">
📍 Address
<span>Peshawar, Pakistan</span>
</div>

<!-- FORM -->
<form action="https://formspree.io/f/mwvjkyql" method="POST">

  <input type="text" name="name" placeholder="Your Name" required>

  <input type="email" name="email" placeholder="Your Email" required>

  <textarea name="message" placeholder="Your Message" required></textarea>

  <!-- IMPORTANT HIDDEN FORMAT (optional but powerful) -->
  <input type="hidden" name="_subject" value="New Developer Contact Message">
  <input type="hidden" name="_replyto" value="email">

  <button type="submit">Send Message 🚀</button>

</form>

<p id="msg"></p>

</div>

<script>

function copyPhone(){
  navigator.clipboard.writeText("03138983870");
  alert("📞 Number copied!");
}

/* REAL EMAIL SEND */
function sendMail(){

  let params = {
    from_name: document.getElementById("name").value,
    email_id: document.getElementById("email").value,
    message: document.getElementById("message").value
  };

  emailjs.send("service_dkw6oce","template_2ox252f",params)
  .then(function(res){
    document.getElementById("msg").innerText =
    "🚀 Message sent successfully to your email!";
  })
  .catch(function(error){
    document.getElementById("msg").innerText =
    "❌ Error sending message!";
  });
}
emailjs.init("WPUeuInagqgk6IjJo");
</script>

</body>
</html>
